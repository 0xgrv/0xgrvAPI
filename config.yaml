url: https://api.target.com

# Auth — pick one or both
# token = Bearer (Authorization: Bearer <token>)
# api_key = sent as X-API-Key header
token: ""
api_key: ""

# Extra headers — add as many as you need
headers:
  - "X-Auth-Token: abc123"

# Telegram — sends 2 messages: scan start + final report with HTML attached
tg_token: ""
tg_chat: ""

# AI analysis
# Providers: anthropic | openai | gemini
# Models: claude-sonnet-4-6 | gpt-4o | gemini-1.5-pro (blank = provider default)
ai_key: ""
ai_provider: "gemini"
ai_model: ""

# Spec file — OpenAPI/Swagger (.json or .yaml)
# spec: ./openapi.yaml

# Output base directory — reports go into Reports/ subfolder inside this
output: "."

# Request timeout in seconds
timeout: 15
